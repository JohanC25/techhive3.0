version: "3.9"

services:
  db:
    image: postgres:14
    container_name: techhive_db
    restart: always

    environment:
      POSTGRES_DB: techhive_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: techhive_backend

    command: python manage.py runserver 0.0.0.0:8000

    depends_on:
      - db

    environment:
      DB_NAME: techhive_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432

    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: techhive_frontend

    depends_on:
      - backend

    expose:
      - "5173"

  proxy:
    image: caddy:2
    container_name: techhive_proxy
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

    depends_on:
      - frontend
      - backend

volumes:
  postgres_data: