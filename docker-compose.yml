version: "3.9"

services:
  db:
    image: postgres:14
    container_name: techhive_db
    restart: always

    environment:
      POSTGRES_DB: techhive_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: techhive_backend

    command: python manage.py runserver 0.0.0.0:8000

    depends_on:
      - db

    environment:
      DB_NAME: techhive_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: techhive_frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app

volumes:
  postgres_data: