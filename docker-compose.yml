services:
  db:
    image: postgres:14
    container_name: techhive_db
    restart: always

    environment:
      POSTGRES_DB: techhive_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: techhive_backend

    command: python manage.py runserver 0.0.0.0:8000

    depends_on:
      - db

    environment:
      DB_NAME: techhive_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432

      DJANGO_ALLOWED_HOSTS: .techhive-ec.com,localhost,127.0.0.1

      DJANGO_CSRF_TRUSTED_ORIGINS: https://admin.techhive-ec.com,http://localhost

    expose:
      - "8000"

    labels:
      - traefik.enable=true

      - traefik.http.routers.techhive-api.rule=Host(`*.techhive-ec.com`) && PathPrefix(`/api`)

      - traefik.http.routers.techhive-api.entrypoints=websecure
      - traefik.http.routers.techhive-api.tls=true
      - traefik.http.routers.techhive-api.tls.certresolver=letsencrypt

      - traefik.http.routers.techhive-api.tls.domains[0].main=techhive-ec.com
      - traefik.http.routers.techhive-api.tls.domains[0].sans=*.techhive-ec.com

      - traefik.http.services.techhive-api.loadbalancer.server.port=8000

    networks:
      - traefik-proxy
      - default

  frontend:
    build: ./frontend
    container_name: techhive_frontend

    depends_on:
      - backend

    expose:
      - "5173"

    labels:
      - traefik.enable=true

      - traefik.http.routers.techhive-web.rule=Host(`techhive-ec.com`) || Host(`*.techhive-ec.com`)

      - traefik.http.routers.techhive-web.entrypoints=websecure
      - traefik.http.routers.techhive-web.tls=true
      - traefik.http.routers.techhive-web.tls.certresolver=letsencrypt

      # wildcard domains
      - traefik.http.routers.techhive-web.tls.domains[0].main=techhive-ec.com
      - traefik.http.routers.techhive-web.tls.domains[0].sans=*.techhive-ec.com

      - traefik.http.services.techhive-web.loadbalancer.server.port=5173

    networks:
      - traefik-proxy
      - default

volumes:
  postgres_data:

networks:
  traefik-proxy:
    external: true